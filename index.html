<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>才藝課小手帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF7EE;
  --card:#FFFFFF;
  --ink:#5B4A56;
  --ink-soft:#9C8A97;
  --pink:#FF7EA8;
  --pink-soft:#FFE3EC;
  --yellow:#FFC24B;
  --yellow-soft:#FFF1D6;
  --mint:#4FC9A0;
  --mint-soft:#DDF5EC;
  --sky:#5FA8F5;
  --sky-soft:#DFEDFE;
  --lavender:#A98BF0;
  --lavender-soft:#EDE6FC;
  --coral:#FF9066;
  --coral-soft:#FFE7DC;
  --red:#E85A7A;
  --line:#F3E3D8;
  --radius:22px;
  --shadow:0 4px 14px rgba(255,126,168,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Zen Maru Gothic','Microsoft JhengHei','PingFang TC',sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 12% 8%, rgba(255,194,75,.12) 0 90px, transparent 90px),
    radial-gradient(circle at 88% 20%, rgba(255,126,168,.10) 0 70px, transparent 70px),
    radial-gradient(circle at 20% 85%, rgba(95,168,245,.08) 0 80px, transparent 80px);
  color:var(--ink);
  font-weight:500;
}
header{padding:22px 20px 6px;text-align:center}
header h1{font-weight:900;font-size:22px;letter-spacing:2px}
header h1 .dot{color:var(--pink)}
header p{font-size:12px;color:var(--ink-soft);margin-top:2px;letter-spacing:1px}
main{
  max-width:480px;margin:0 auto;
  padding:10px 16px calc(150px + env(safe-area-inset-bottom));
}
.page{display:none;animation:pop .25s ease}
.page.active{display:block}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.page{animation:none}}

.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px;
  border:2px solid #fff;
}
.card h2{font-size:15px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* 課程貼紙 chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:none;cursor:pointer;font-family:inherit;font-weight:700;
  padding:9px 14px;border-radius:999px;font-size:14px;color:var(--ink);
  background:var(--c-soft,#eee);border:2px solid transparent;
  transition:transform .12s ease, border-color .12s ease;
}
.chip .em{margin-right:4px}
.chip.sel{border-color:var(--c,#999);transform:scale(1.06);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.chip:active{transform:scale(.95)}

/* 型態選擇 */
.type-row{display:flex;gap:8px;margin-top:12px}
.type-btn{
  flex:1;border:2px solid var(--line);background:#fff;border-radius:16px;
  padding:10px 6px;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;
}
.type-btn.sel{border-color:var(--pink);background:var(--pink-soft)}

label.fld{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 4px}
input[type=date],input[type=time],input[type=month],input[type=text],input[type=number],select,textarea{
  width:100%;font-family:inherit;font-size:16px;font-weight:700;color:var(--ink);
  border:2px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff;
  appearance:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pink)}
textarea{font-weight:500;line-height:1.6;resize:vertical}

/* 堂數 stepper */
.stepper{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:4px}
.stepper button{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  font-size:26px;font-weight:900;color:#fff;background:var(--pink);
  box-shadow:0 4px 0 #e2688f;font-family:inherit;flex:none;
}
.stepper button:active{transform:translateY(2px);box-shadow:0 2px 0 #e2688f}
.stepper .num{font-size:34px;font-weight:900;min-width:64px;text-align:center}
.stepper .num small{font-size:14px;color:var(--ink-soft)}
.stepper.small button{width:40px;height:40px;font-size:20px;background:var(--sky);box-shadow:0 3px 0 #4a86c9}
.stepper.small button:active{box-shadow:0 1px 0 #4a86c9}
.stepper.small .num{font-size:22px;min-width:84px}

.time-row{display:flex;gap:10px;align-items:center}
.time-row>div{flex:1}
.dur-hint{text-align:center;font-size:13px;color:var(--mint);font-weight:900;margin-top:8px;min-height:18px}

.big-btn{
  display:block;width:100%;border:none;cursor:pointer;margin-top:16px;
  background:linear-gradient(135deg,var(--pink),var(--coral));color:#fff;
  font-family:inherit;font-size:17px;font-weight:900;letter-spacing:3px;
  padding:14px;border-radius:999px;box-shadow:0 5px 0 #e2688f;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #e2688f}
.big-btn.alt{background:linear-gradient(135deg,var(--sky),var(--lavender));box-shadow:0 5px 0 #7d8fd8}
.big-btn.alt:active{box-shadow:0 2px 0 #7d8fd8}
.big-btn.mint{background:linear-gradient(135deg,var(--mint),#7ED8B9);box-shadow:0 5px 0 #3aa583}
.big-btn.mint:active{box-shadow:0 2px 0 #3aa583}

/* 有作業 checkbox 區 */
.hw-toggle{
  display:flex;align-items:center;gap:10px;margin-top:14px;
  background:var(--yellow-soft);border-radius:14px;padding:11px 14px;cursor:pointer;
  font-weight:900;font-size:14px;user-select:none;
}
.hw-toggle input{width:22px;height:22px;accent-color:var(--pink)}
.hw-extra{display:none;background:#FFFDF7;border:2px dashed var(--yellow);border-radius:14px;padding:4px 12px 12px;margin-top:10px}
.hw-extra.show{display:block}

/* 紀錄清單 */
.rec{
  display:flex;align-items:flex-start;gap:8px;padding:10px 2px;
  border-bottom:2px dashed var(--line);
}
.rec:last-child{border-bottom:none}
.rec .badge{
  width:40px;height:40px;border-radius:14px;flex:none;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--c-soft,#eee);
}
.rec .info{flex:1;min-width:0}
.rec .info b{font-size:14px}
.rec .info span{display:block;font-size:12px;color:var(--ink-soft)}
.rec .info .memo{
  font-size:12px;color:var(--ink);background:var(--yellow-soft);
  border-radius:10px;padding:5px 9px;margin-top:5px;line-height:1.5;
  white-space:pre-wrap;word-break:break-word;
}
.rec .amt{font-size:13px;font-weight:900;color:var(--c,var(--ink));white-space:nowrap;padding-top:10px}
.icon-btn{
  border:none;background:none;cursor:pointer;font-size:15px;
  padding:10px 5px;font-family:inherit;flex:none;
}
.icon-btn.edit{color:#b9a3d8}
.icon-btn.del{color:#d9c4cf}
.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:22px 0;line-height:1.8}
.empty .face{font-size:34px;display:block;margin-bottom:6px}

/* 統計 */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border-radius:999px;box-shadow:var(--shadow);
  padding:6px;margin-bottom:12px;border:2px solid #fff;
}
.month-nav button{
  width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;
  background:var(--yellow-soft);color:var(--ink);font-size:17px;font-family:inherit;font-weight:900;
}
.month-nav .m-label{font-size:16px;font-weight:900;letter-spacing:1px}
.view-toggle{display:flex;gap:8px;margin-bottom:12px}
.view-toggle button{
  flex:1;border:2px solid var(--line);background:#fff;border-radius:999px;
  padding:9px;font-family:inherit;font-weight:900;font-size:13px;color:var(--ink-soft);cursor:pointer;
}
.view-toggle button.sel{border-color:var(--pink);background:var(--pink-soft);color:var(--ink)}
.sum-line{font-size:12px;color:var(--ink-soft);text-align:center;margin:-4px 0 12px}
.stat-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  border:2px solid #fff;margin-bottom:12px;overflow:hidden;
}
.stat-head{
  display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;
  border-left:8px solid var(--c,#ccc);
}
.stat-head .em{font-size:22px}
.stat-head .nm{flex:1;font-weight:900;font-size:15px}
.stat-head .tot{font-size:13px;font-weight:900;color:var(--c,var(--ink));text-align:right;line-height:1.5}
.stat-head .arrow{color:var(--ink-soft);font-size:12px;transition:transform .2s}
.stat-card.open .arrow{transform:rotate(90deg)}
.stat-detail{display:none;padding:4px 16px 12px;border-top:2px dashed var(--line)}
.stat-card.open .stat-detail{display:block}
.stat-detail .d-row{
  font-size:13px;padding:7px 2px;border-bottom:1px dashed var(--line);
}
.stat-detail .d-row:last-child{border-bottom:none}
.stat-detail .d-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.stat-detail .d-top .d-l{flex:1}
.stat-detail .d-top .d-r{color:var(--ink-soft)}
.stat-detail .d-top .d-edit{
  border:none;background:none;color:#b9a3d8;cursor:pointer;font-size:14px;padding:2px 4px;font-family:inherit;
}
.stat-detail .d-memo{
  font-size:12px;background:var(--yellow-soft);border-radius:10px;
  padding:5px 9px;margin-top:5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;
}

/* 日曆 */
.cal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:2px solid #fff;padding:12px;margin-bottom:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-wd{text-align:center;font-size:11px;font-weight:900;color:var(--ink-soft);padding:4px 0}
.cal-wd.sun{color:var(--red)}
.cal-wd.sat{color:var(--sky)}
.cal-day{
  min-height:54px;border-radius:12px;border:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;padding:4px 1px 3px;
  font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;background:none;font-family:inherit;
}
.cal-day.has{background:#FFFBF3}
.cal-day.today{border-color:var(--yellow)}
.cal-day.sel{border-color:var(--pink)!important;background:var(--pink-soft)}
.cal-day.blank{cursor:default}
.cal-day.sun .dnum,.cal-day.hol .dnum{color:var(--red)}
.cal-day.sat .dnum{color:var(--sky)}
.hname{
  font-size:8px;color:var(--red);line-height:1.2;max-width:46px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.cal-dots{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;margin-top:2px;max-width:38px}
.cal-dots i{width:7px;height:7px;border-radius:50%;display:block}
.cal-dots .more{font-size:8px;font-style:normal;color:var(--ink-soft);width:auto;height:auto;line-height:7px}
.hol-tag{
  display:inline-block;font-size:11px;font-weight:900;color:var(--red);
  background:#FDE8ED;border-radius:999px;padding:2px 10px;margin-left:6px;
}

/* 作業 */
.hw-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  border:2px solid #fff;border-left:8px solid var(--c,#ccc);
  padding:14px 16px;margin-bottom:12px;
}
.hw-top{display:flex;align-items:center;gap:8px}
.hw-top .em{font-size:20px}
.hw-top .nm{font-weight:900;font-size:14px;flex:1}
.hw-top .mode-tag{font-size:11px;font-weight:900;padding:3px 9px;border-radius:999px}
.mode-tag.d{background:var(--mint-soft);color:#2e9976}
.mode-tag.t{background:var(--sky-soft);color:#3d7fc7}
.hw-txt{font-size:14px;line-height:1.6;margin:8px 0 4px;white-space:pre-wrap;word-break:break-word}
.hw-meta{font-size:12px;color:var(--ink-soft);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.hw-meta .fire{color:var(--coral);font-weight:900}
.hw-done-today{
  text-align:center;font-size:14px;font-weight:900;color:var(--mint);
  background:var(--mint-soft);border-radius:999px;padding:11px;margin-top:10px;
}
.hw-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.mini{
  border:2px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;
  font-family:inherit;font-weight:900;font-size:12px;color:var(--ink-soft);padding:7px 14px;
}
.check-btn{
  display:block;width:100%;border:none;cursor:pointer;margin-top:8px;
  background:linear-gradient(135deg,var(--mint),#7ED8B9);color:#fff;
  font-family:inherit;font-size:16px;font-weight:900;letter-spacing:2px;
  padding:12px;border-radius:999px;box-shadow:0 4px 0 #3aa583;
}
.check-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #3aa583}
.hw-week{display:flex;gap:5px;margin-top:10px;justify-content:center}
.hw-week .wcell{width:34px;text-align:center;font-size:10px;color:var(--ink-soft);font-weight:700}
.hw-week .wcell .b{
  width:26px;height:26px;border-radius:50%;margin:2px auto 0;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  background:#F5EDE6;
}
.hw-week .wcell .b.on{background:var(--mint-soft)}
.done-list .rec .info b{font-size:13px}

/* 分享 */
.share-tabs{display:flex;gap:8px;margin-bottom:14px}
.share-tab{
  flex:1;border:2px solid var(--line);background:#fff;border-radius:16px;
  padding:12px 8px;font-family:inherit;font-weight:900;font-size:14px;color:var(--ink);cursor:pointer;
}
.share-tab.sel{border-color:var(--sky);background:var(--sky-soft)}
.preview{
  background:#FFFDF7;border:2px dashed var(--yellow);border-radius:14px;
  padding:12px;font-size:13px;white-space:pre-wrap;line-height:1.7;
  margin-top:12px;max-height:220px;overflow:auto;word-break:break-all;
}
.hint{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.6}

/* 課程管理 */
.course-row{
  display:flex;align-items:center;gap:8px;padding:11px 2px;
  border-bottom:2px dashed var(--line);
}
.course-row:last-child{border-bottom:none}
.course-row .badge{
  width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:21px;background:var(--c-soft,#eee);flex:none;
}
.course-row .nm{flex:1;font-weight:900;font-size:15px;min-width:0}
.tag{font-size:11px;font-weight:900;padding:3px 9px;border-radius:999px;margin-left:4px}
.tag.g{background:var(--mint-soft);color:#2e9976}
.tag.p{background:var(--lavender-soft);color:#7d5fd0}
.emoji-pick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.emoji-pick button{
  width:42px;height:42px;font-size:20px;border-radius:12px;border:2px solid var(--line);
  background:#fff;cursor:pointer;
}
.emoji-pick button.sel{border-color:var(--pink);background:var(--pink-soft)}
.swatches{display:flex;gap:10px;margin-top:6px}
.swatches button{
  width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;
}
.swatches button.sel{border-color:var(--ink)}

/* 底部導覽 */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  border-top:2px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;
  border-radius:24px 24px 0 0;
  padding:6px 2px calc(6px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 18px rgba(91,74,86,.08);
}
nav button{
  flex:1;border:none;background:none;cursor:pointer;font-family:inherit;
  font-size:10px;font-weight:900;color:var(--ink-soft);padding:6px 0;
  display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:16px;
}
nav button .ic{font-size:20px;filter:grayscale(.8);transition:transform .15s}
nav button.sel{color:var(--pink)}
nav button.sel .ic{filter:none;transform:scale(1.15)}

/* 編輯 modal(底部彈出) */
#modal-bg{
  position:fixed;inset:0;background:rgba(91,74,86,.45);z-index:50;
  display:none;align-items:flex-end;justify-content:center;
}
#modal-bg.show{display:flex}
#modal{
  background:var(--bg);border-radius:24px 24px 0 0;
  max-width:480px;width:100%;max-height:84vh;overflow:auto;
  padding:16px 18px calc(20px + env(safe-area-inset-bottom));
  animation:slideup .22s ease;
}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
#modal h3{font-size:16px;font-weight:900;text-align:center;margin-bottom:4px}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns .big-btn{flex:1;margin-top:0}
.modal-btns .cancel{
  flex:1;border:2px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;
  font-family:inherit;font-weight:900;font-size:15px;color:var(--ink-soft);letter-spacing:2px;
}
.log-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.log-row input[type=date]{flex:2}
.log-row input[type=number]{flex:1;min-width:74px}
.log-row .unit{font-size:12px;color:var(--ink-soft);flex:none}
.log-row .rm{
  border:none;background:none;color:#d9c4cf;font-size:16px;cursor:pointer;padding:6px;flex:none;font-family:inherit;
}

/* toast */
#toast{
  position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-size:13px;font-weight:700;
  padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;
  transition:all .25s ease;z-index:99;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1>🎀 才藝課小手帳 <span class="dot">♪</span></h1>
  <p>記錄每一天的小小努力</p>
</header>

<main>

<!-- ===== 記錄 ===== -->
<section class="page active" id="page-record">
  <div class="card">
    <h2>✏️ 今天上了什麼課?</h2>
    <div class="chips" id="rec-chips"></div>

    <div id="rec-form" style="display:none">
      <div class="type-row" id="rec-type-row" style="display:none">
        <button class="type-btn" data-t="g" onclick="pickType('g')">👭 團體課</button>
        <button class="type-btn" data-t="p" onclick="pickType('p')">👩‍🏫 個人課</button>
      </div>

      <label class="fld">上課日期</label>
      <input type="date" id="rec-date">

      <div id="rec-group" style="display:none">
        <label class="fld">上了幾堂</label>
        <div class="stepper">
          <button onclick="stepCount(-1)">−</button>
          <div class="num"><span id="rec-count">1</span> <small>堂</small></div>
          <button onclick="stepCount(1)">＋</button>
        </div>
      </div>

      <div id="rec-private" style="display:none">
        <div class="time-row">
          <div>
            <label class="fld">開始時間</label>
            <input type="time" id="rec-start" onchange="updateDur()">
          </div>
          <div>
            <label class="fld">結束時間</label>
            <input type="time" id="rec-end" onchange="updateDur()">
          </div>
        </div>
        <div class="dur-hint" id="rec-dur"></div>
      </div>

      <label class="fld">📝 課程日記(選填)</label>
      <textarea id="rec-memo" rows="2" placeholder="今天學了什麼、老師說了什麼,想記就記~"></textarea>

      <label class="hw-toggle">
        <input type="checkbox" id="rec-hw" onchange="toggleHw()">
        📚 這堂課有作業!
      </label>
      <div class="hw-extra" id="rec-hw-extra">
        <label class="fld">作業內容</label>
        <input type="text" id="rec-hw-txt" placeholder="例如:下腰10次、練第三首曲子" maxlength="60">
        <label class="fld">練習方式</label>
        <div class="type-row" style="margin-top:2px">
          <button class="type-btn sel" data-hm="d" onclick="pickHwMode('d')">✅ 完成打卡<br><small style="font-weight:500">做到就算一次</small></button>
          <button class="type-btn" data-hm="t" onclick="pickHwMode('t')">⏱ 計時練習<br><small style="font-weight:500">記錄練了多久</small></button>
        </div>
      </div>

      <button class="big-btn" id="rec-save" onclick="saveRecord()">記下來!</button>
    </div>
  </div>

<script>
"use strict";
/* ================= 資料層 ================= */
const KEY = 'lesson-tracker-data';
const PREFIX_V2 = 'LESSON-BACKUP-v2:';
const PREFIX_V1 = 'LESSON-BACKUP-v1:';
const COLORS = [
  ['#FF7EA8','#FFE3EC'],['#4FC9A0','#DDF5EC'],['#5FA8F5','#DFEDFE'],
  ['#FFB020','#FFF1D6'],['#A98BF0','#EDE6FC'],['#FF9066','#FFE7DC']
];
const EMOJIS = ['🩰','🎾','🏊','🎨','🎹','🤸','🎻','🥋','⚽','🏀','🎤','📚','🧮','💃','🏸','⛸️'];

function defaultData(){
  return {
    courses:[
      {name:'中國舞', em:'🩰', types:'gp', ci:0},
      {name:'網球',   em:'🎾', types:'g',  ci:1},
      {name:'游泳',   em:'🏊', types:'g',  ci:2},
      {name:'繪畫',   em:'🎨', types:'g',  ci:3},
      {name:'鋼琴',   em:'🎹', types:'p',  ci:4}
    ],
    records:[],   // {d,c,t,n,m?} 或 {d,c,t,s,e,m?}
    homeworks:[]  // {id,c,d,txt,mode:'d'|'t',done,doneAt?,logs:[{d,m?}]}
  };
}
let DB;
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    DB = raw ? JSON.parse(raw) : defaultData();
    if(!DB.courses || !DB.records) DB = defaultData();
    if(!Array.isArray(DB.homeworks)) DB.homeworks = [];
  }catch(e){ DB = defaultData(); }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
function courseOf(name){ return DB.courses.find(c=>c.name===name); }
function colorOf(c){ return COLORS[(c&&c.ci||0)%COLORS.length]; }
function recKey(r){ return [r.d,r.c,r.t,r.s||'',r.e||'',r.n||''].join('|'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================= 日本の祝日(公式計算,1980–2099 有效) ================= */
const _holCache = {};
function jpHolidays(y){
  if(_holCache[y]) return _holCache[y];
  const key = (m,d)=> y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  const nthMon = (m,n)=>{
    const first = new Date(y, m-1, 1).getDay();
    return 1 + ((8-first)%7) + 7*(n-1);
  };
  const H = {};
  H[key(1,1)]  = '元日';
  H[key(1,nthMon(1,2))] = '成人の日';
  H[key(2,11)] = '建国記念の日';
  H[key(2,23)] = '天皇誕生日';
  H[key(3, Math.floor(20.8431 + 0.242194*(y-1980) - Math.floor((y-1980)/4)))] = '春分の日';
  H[key(4,29)] = '昭和の日';
  H[key(5,3)]  = '憲法記念日';
  H[key(5,4)]  = 'みどりの日';
  H[key(5,5)]  = 'こどもの日';
  H[key(7,nthMon(7,3))]  = '海の日';
  H[key(8,11)] = '山の日';
  H[key(9,nthMon(9,3))]  = '敬老の日';
  H[key(9, Math.floor(23.2488 + 0.242194*(y-1980) - Math.floor((y-1980)/4)))] = '秋分の日';
  H[key(10,nthMon(10,2))] = 'スポーツの日';
  H[key(11,3)]  = '文化の日';
  H[key(11,23)] = '勤労感謝の日';
  // 振替休日:祝日が日曜 → 次の平日(非祝日)
  const fmt = dt => dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  Object.keys(H).slice().forEach(ds=>{
    const dt = new Date(ds+'T00:00:00');
    if(dt.getDay()===0){
      const n = new Date(dt);
      do{ n.setDate(n.getDate()+1); }while(H[fmt(n)]);
      H[fmt(n)] = '振替休日';
    }
  });
  // 国民の休日:祝日に挟まれた平日
  const cur = new Date(y,0,2);
  while(cur.getFullYear()===y){
    const ds = fmt(cur);
    if(!H[ds] && cur.getDay()!==0){
      const prev = new Date(cur); prev.setDate(prev.getDate()-1);
      const next = new Date(cur); next.setDate(next.getDate()+1);
      if(H[fmt(prev)] && H[fmt(next)]) H[ds] = '国民の休日';
    }
    cur.setDate(cur.getDate()+1);
  }
  _holCache[y] = H;
  return H;
}

/* ================= 小工具 ================= */
const WD = ['日','一','二','三','四','五','六'];
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(ds){
  const [y,m,d] = ds.split('-').map(Number);
  const wd = WD[new Date(y,m-1,d).getDay()];
  return m+'/'+d+'('+wd+')';
}
function hoursOf(r){
  const [sh,sm] = r.s.split(':').map(Number);
  const [eh,em] = r.e.split(':').map(Number);
  let mins = (eh*60+em)-(sh*60+sm);
  if(mins<0) mins += 24*60;
  return mins/60;
}
function fmtH(h){ return (Math.round(h*100)/100).toLocaleString(); }
function fmtMin(m){
  const h = Math.floor(m/60), r = m%60;
  if(h && r) return h+'小時'+r+'分';
  if(h) return h+'小時';
  return r+'分鐘';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'),2200);
}

/* ================= 導覽 ================= */
function go(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('sel', b.dataset.page===p));
  if(p==='stats') renderStats();
  if(p==='hw') renderHw();
  if(p==='share') initShare();
  if(p==='course') renderCourses();
  if(p==='record'){ renderChips(); renderRecent(); }
  window.scrollTo(0,0);
}

/* ================= 編輯 modal 共通 ================= */
function openModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('show');
  document.getElementById('modal').innerHTML = '';
}
function courseOptions(selected){
  let names = DB.courses.map(c=>c.name);
  if(selected && !names.includes(selected)) names = [selected, ...names];
  return names.map(n=>{
    const c = courseOf(n);
    return '<option value="'+esc(n)+'"'+(n===selected?' selected':'')+'>'+(c?c.em+' ':'⭐ ')+esc(n)+'</option>';
  }).join('');
}

/* ===== 紀錄編輯 ===== */
let editingRec = null, mdRecType = 'g';
function openRecEdit(r){
  editingRec = r;
  mdRecType = r.t;
  openModal(
    '<h3>✏️ 編輯紀錄</h3>'+
    '<label class="fld">才藝課</label>'+
    '<select id="md-c">'+courseOptions(r.c)+'</select>'+
    '<label class="fld">型態</label>'+
    '<div class="type-row" style="margin-top:2px">'+
      '<button class="type-btn'+(r.t==='g'?' sel':'')+'" data-mt="g" onclick="mdPickType(\'g\')">👭 團體課</button>'+
      '<button class="type-btn'+(r.t==='p'?' sel':'')+'" data-mt="p" onclick="mdPickType(\'p\')">👩‍🏫 個人課</button>'+
    '</div>'+
    '<label class="fld">日期</label>'+
    '<input type="date" id="md-d" value="'+r.d+'">'+
    '<div id="md-g-block" style="display:'+(r.t==='g'?'block':'none')+'">'+
      '<label class="fld">堂數(1–9)</label>'+
      '<input type="number" id="md-n" min="1" max="9" value="'+(r.n||1)+'">'+
    '</div>'+
    '<div id="md-p-block" style="display:'+(r.t==='p'?'block':'none')+'">'+
      '<div class="time-row">'+
        '<div><label class="fld">開始</label><input type="time" id="md-s" value="'+(r.s||'')+'"></div>'+
        '<div><label class="fld">結束</label><input type="time" id="md-e" value="'+(r.e||'')+'"></div>'+
      '</div>'+
    '</div>'+
    '<label class="fld">📝 課程日記</label>'+
    '<textarea id="md-m" rows="2">'+esc(r.m||'')+'</textarea>'+
    '<div class="modal-btns">'+
      '<button class="cancel" onclick="closeModal()">取消</button>'+
      '<button class="big-btn" onclick="saveRecEdit()">儲存</button>'+
    '</div>'
  );
}
function mdPickType(t){
  mdRecType = t;
  document.querySelectorAll('[data-mt]').forEach(b=>b.classList.toggle('sel', b.dataset.mt===t));
  document.getElementById('md-g-block').style.display = t==='g'?'block':'none';
  document.getElementById('md-p-block').style.display = t==='p'?'block':'none';
}
function saveRecEdit(){
  const r = editingRec;
  const c = document.getElementById('md-c').value;
  const d = document.getElementById('md-d').value;
  if(!d){ toast('日期還沒選唷'); return; }
  if(mdRecType==='g'){
    const n = parseInt(document.getElementById('md-n').value,10);
    if(!(n>=1 && n<=9)){ toast('堂數要在 1~9 之間唷'); return; }
    r.n = n; delete r.s; delete r.e;
  }else{
    const s = document.getElementById('md-s').value;
    const e = document.getElementById('md-e').value;
    if(!s || !e){ toast('開始和結束時間都要填唷'); return; }
    if(hoursOf({s,e})<=0){ toast('結束時間要在開始之後唷'); return; }
    r.s = s; r.e = e; delete r.n;
  }
  r.c = c; r.t = mdRecType; r.d = d;
  const m = document.getElementById('md-m').value.trim();
  if(m) r.m = m; else delete r.m;
  save(); closeModal(); toast('改好了!✨');
  refreshAll();
}
function delRec(r){
  if(confirm('要刪掉這筆「'+r.c+' '+fmtDate(r.d)+'」的紀錄嗎?')){
    const i = DB.records.indexOf(r);
    if(i>-1){ DB.records.splice(i,1); save(); refreshAll(); }
  }
}
function refreshAll(){
  renderRecent();
  if(document.getElementById('page-stats').classList.contains('active')) renderStats();
  if(document.getElementById('page-hw').classList.contains('active')) renderHw();
}

      '<button class="cancel" onclick="closeModal()">取消</button>'+
      '<button class="big-btn" onclick="saveHwEdit()">儲存</button>'+

  );

}
function mdPickHwMode(m){
  mdHwMode = m;
  document.querySelectorAll('[data-mhm]').forEach(b=>b.classList.toggle('sel', b.dataset.mhm===m));
  renderMdLogs();
}
function renderMdLogs(){
  const box = document.getElementById('md-logs');
  if(!box) return;
  if(mdLogs.length===0){
    box.innerHTML = '<p class="hint" style="margin-top:4px">還沒有打卡紀錄</p>';
    return;
  }
  box.innerHTML = mdLogs.map((l,i)=>
    '<div class="log-row">'+
    '<input type="date" value="'+l.d+'" onchange="mdLogs['+i+'].d=this.value">'+
    (mdHwMode==='t'
      ? '<input type="number" min="1" max="600" value="'+(l.m||30)+'" onchange="mdLogs['+i+'].m=parseInt(this.value,10)||30"><span class="unit">分</span>'
      : '')+
    '<button class="rm" onclick="mdLogs.splice('+i+',1);renderMdLogs()">✕</button>'+
    '</div>'
  ).join('');
}
function mdAddLog(){
  mdLogs.push(mdHwMode==='t' ? {d:todayStr(), m:30} : {d:todayStr()});
  renderMdLogs();
}
function saveHwEdit(){
  const hw = editingHw;
  const txt = document.getElementById('md-htxt').value.trim();
  const d = document.getElementById('md-hd').value;
  if(!txt){ toast('作業內容還沒填唷'); return; }
  if(!d){ toast('日期還沒選唷'); return; }
  hw.c = document.getElementById('md-hc').value;
  hw.txt = txt; hw.mode = mdHwMode; hw.d = d;
  // 打卡:去掉空日期、同日期合併保留;完成型去掉分鐘數
  hw.logs = mdLogs.filter(l=>l.d).map(l=> mdHwMode==='t' ? {d:l.d, m:l.m||30} : {d:l.d});
  save(); closeModal(); toast('作業改好了!✨');
  if(document.getElementById('page-hw').classList.contains('active')) renderHw();
}

  box.innerHTML = '';
  list.forEach(em=>{
    const b = document.createElement('button');
    b.textContent = em;
    b.className = em===mdCEmoji ? 'sel':'';
    b.onclick = ()=>{ mdCEmoji = em; renderMdEmoji(); };
    box.appendChild(b);
  });
}
function renderMdSwatch(){
  const box = document.getElementById('md-swatch');
  box.innerHTML = '';
  COLORS.forEach((col,i)=>{
    const b = document.createElement('button');
    b.style.background = col[0];
    b.className = i===mdCCi ? 'sel':'';
    b.onclick = ()=>{ mdCCi = i; renderMdSwatch(); };
    box.appendChild(b);
  });
}
function saveCourseEdit(){
  const c = editingCourse;
  const name = document.getElementById('md-cname').value.trim();
  if(!name){ toast('課程名稱還沒填唷'); return; }
  if(name!==c.name && courseOf(name)){ toast('已經有同名的課程囉'); return; }
  if(name!==c.name){
    // 改名同步到所有紀錄與作業
    DB.records.forEach(r=>{ if(r.c===c.name) r.c = name; });
    DB.homeworks.forEach(h=>{ if(h.c===c.name) h.c = name; });
    c.name = name;
  }
  c.types = mdCType; c.em = mdCEmoji; c.ci = mdCCi;
  save(); closeModal(); toast('課程改好了!✨');
  renderCourses(); renderChips();
}

/* ================= 記錄頁 ================= */
let selCourse = null, selType = null, count = 1, hwMode = 'd';

function renderChips(){
  const box = document.getElementById('rec-chips');
  box.innerHTML = '';
  if(DB.courses.length===0){
    box.innerHTML = '<div class="empty"><span class="face">🌱</span>還沒有課程,先到「課程」頁新增吧!</div>';
    return;
  }
  DB.courses.forEach(c=>{
    const [col,soft] = colorOf(c);
    const b = document.createElement('button');
    b.className = 'chip'+(selCourse===c.name?' sel':'');
    b.style.setProperty('--c',col); b.style.setProperty('--c-soft',soft);
    b.innerHTML = '<span class="em">'+c.em+'</span>'+esc(c.name);
    b.onclick = ()=>pickCourse(c.name);
    box.appendChild(b);
  });
}
function pickCourse(name){
  selCourse = name;
  const c = courseOf(name);
  renderChips();
  document.getElementById('rec-form').style.display = 'block';
  document.getElementById('rec-date').value = todayStr();
  const row = document.getElementById('rec-type-row');
  if(c.types==='gp'){
    row.style.display = 'flex'; selType = null;
    row.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel'));
    showTypeForm();
  }else{
    row.style.display = 'none';
    pickType(c.types);
  }
}
function pickType(t){
  selType = t;
  document.querySelectorAll('#rec-type-row .type-btn').forEach(b=>b.classList.toggle('sel', b.dataset.t===t));
  showTypeForm();
}
function showTypeForm(){
  document.getElementById('rec-group').style.display   = selType==='g' ? 'block':'none';
  document.getElementById('rec-private').style.display = selType==='p' ? 'block':'none';
  if(selType==='g'){ count = 1; document.getElementById('rec-count').textContent = count; }
  if(selType==='p'){ updateDur(); }
}
function stepCount(d){
  count = Math.min(9, Math.max(1, count+d));
  document.getElementById('rec-count').textContent = count;
}
function updateDur(){
  const s = document.getElementById('rec-start').value;
  const e = document.getElementById('rec-end').value;
  const el = document.getElementById('rec-dur');
  if(s && e){
    const h = hoursOf({s,e});
    el.textContent = h>0 ? '⏱ 共 '+fmtH(h)+' 小時' : '';
  }else el.textContent = '';
}
function toggleHw(){
  const on = document.getElementById('rec-hw').checked;
  document.getElementById('rec-hw-extra').classList.toggle('show', on);
}
function pickHwMode(m){
  hwMode = m;
  document.querySelectorAll('[data-hm]').forEach(b=>b.classList.toggle('sel', b.dataset.hm===m));
}
function saveRecord(){
  if(!selCourse){ toast('先選一個課程唷'); return; }
  if(!selType){ toast('選一下是團體課還是個人課'); return; }
  const d = document.getElementById('rec-date').value;
  if(!d){ toast('日期還沒選唷'); return; }
  let r;
  if(selType==='g'){
    r = {d, c:selCourse, t:'g', n:count};
  }else{
    const s = document.getElementById('rec-start').value;
    const e = document.getElementById('rec-end').value;
    if(!s || !e){ toast('開始和結束時間都要填唷'); return; }
    if(hoursOf({s,e})<=0){ toast('結束時間要在開始之後唷'); return; }
    r = {d, c:selCourse, t:'p', s, e};
  }
  const memo = document.getElementById('rec-memo').value.trim();
  if(memo) r.m = memo;

  const hwOn = document.getElementById('rec-hw').checked;
  const hwTxt = document.getElementById('rec-hw-txt').value.trim();
  if(hwOn && !hwTxt){ toast('作業內容還沒填唷'); return; }

  DB.records.push(r);
  let msg = '記好了!⭐';
  if(hwOn && hwTxt){
    DB.homeworks.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      c:selCourse, d, txt:hwTxt, mode:hwMode, done:false, logs:[]
    });
    msg = '記好了!作業也加進打卡清單囉 ⭐';
  }
  save();
  toast(msg);
  selCourse=null; selType=null; count=1; hwMode='d';
  document.getElementById('rec-form').style.display='none';
  document.getElementById('rec-start').value='';
  document.getElementById('rec-end').value='';
  document.getElementById('rec-memo').value='';
  document.getElementById('rec-hw').checked=false;
  document.getElementById('rec-hw-txt').value='';
  document.getElementById('rec-hw-extra').classList.remove('show');
  pickHwMode('d');
  renderChips(); renderRecent();
}
function createRecRow(r, opts){
  const c = courseOf(r.c) || {em:'⭐',ci:5};
  const [col,soft] = colorOf(c);
  const detail = r.t==='g' ? '團體課' : '個人課 '+r.s+'–'+r.e;
  const amt = r.t==='g' ? r.n+' 堂' : fmtH(hoursOf(r))+' 小時';
  const div = document.createElement('div');
  div.className = 'rec';
  div.style.setProperty('--c',col); div.style.setProperty('--c-soft',soft);
  div.innerHTML =
    '<div class="badge">'+c.em+'</div>'+
    '<div class="info"><b>'+esc(r.c)+'</b><span>'+fmtDate(r.d)+'・'+detail+'</span>'+
    (r.m ? '<div class="memo">📝 '+esc(r.m)+'</div>' : '')+
    '</div>'+
    '<div class="amt">'+amt+'</div>'+
    (opts.edit ? '<button class="icon-btn edit" title="編輯">✎</button>' : '')+
    (opts.del ? '<button class="icon-btn del" title="刪除">✕</button>' : '');
  if(opts.edit) div.querySelector('.icon-btn.edit').onclick = ()=>openRecEdit(r);
  if(opts.del)  div.querySelector('.icon-btn.del').onclick  = ()=>delRec(r);
  return div;
}
function renderRecent(){
  const box = document.getElementById('recent-list');
  const list = DB.records.slice().sort((a,b)=> b.d.localeCompare(a.d) || (b.s||'').localeCompare(a.s||'')).slice(0,8);
  if(list.length===0){
    box.innerHTML = '<div class="empty"><span class="face">📖</span>還沒有紀錄,上完課來記一筆吧!</div>';
    return;
  }
  box.innerHTML = '';
  list.forEach(r=> box.appendChild(createRecRow(r, {edit:true, del:true})));
}

/* ================= 統計頁 ================= */
let statY, statM, statView = 'list', calSelDay = null;
function initStatMonth(){
  const t = new Date(); statY = t.getFullYear(); statM = t.getMonth()+1;
}
function moveMonth(d){
  statM += d;
  if(statM>12){ statM=1; statY++; }
  if(statM<1){ statM=12; statY--; }
  calSelDay = null;
  renderStats();
}
function setView(v){
  statView = v;
  document.getElementById('vt-list').classList.toggle('sel', v==='list');
  document.getElementById('vt-cal').classList.toggle('sel', v==='cal');
  renderStats();
}
function monthRecords(y,m,course){
  const p = y+'-'+String(m).padStart(2,'0');
  return DB.records.filter(r=> r.d.startsWith(p) && (!course || r.c===course));
}
function renderStats(){
  document.getElementById('stat-month').textContent = statY+'年'+statM+'月';
  const recs = monthRecords(statY,statM);
  const sumEl = document.getElementById('stat-sum');
  if(recs.length===0){
    sumEl.textContent = '';
  }else{
    const days = new Set(recs.map(r=>r.d)).size;
    sumEl.textContent = '這個月一共上課 '+days+' 天,'+recs.length+' 筆紀錄 🌟';
  }
  document.getElementById('stat-list').style.display = statView==='list' ? 'block':'none';
  document.getElementById('stat-cal').style.display  = statView==='cal'  ? 'block':'none';
  if(statView==='list') renderStatList(recs);
  else renderStatCal(recs);
}
function renderStatList(recs){
  const box = document.getElementById('stat-list');
  if(recs.length===0){
    box.innerHTML = '<div class="card"><div class="empty"><span class="face">🌙</span>這個月還沒有紀錄</div></div>';
    return;
  }
  box.innerHTML = '';
  const known = new Set(DB.courses.map(c=>c.name));
  const names = [...DB.courses.map(c=>c.name), ...[...new Set(recs.map(r=>r.c))].filter(n=>!known.has(n))];
  names.forEach(name=>{
    const rs = recs.filter(r=>r.c===name);
    if(rs.length===0) return;
    const c = courseOf(name) || {em:'⭐', ci:5};
    const g = rs.filter(r=>r.t==='g').reduce((s,r)=>s+r.n,0);
    const p = rs.filter(r=>r.t==='p').reduce((s,r)=>s+hoursOf(r),0);
    const [col,soft] = colorOf(c);
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.style.setProperty('--c',col); card.style.setProperty('--c-soft',soft);
    let tot = [];
    if(g>0) tot.push('團體 '+g+' 堂');
    if(p>0) tot.push('個人 '+fmtH(p)+' 小時');
    const sorted = rs.slice().sort((a,b)=>a.d.localeCompare(b.d)||(a.s||'').localeCompare(b.s||''));
    const detail = sorted.map(r=>{
        const idx = DB.records.indexOf(r);
        const left = fmtDate(r.d)+' '+(r.t==='g'?'團體課':'個人課');
        const right = r.t==='g' ? r.n+' 堂' : r.s+'–'+r.e+'('+fmtH(hoursOf(r))+'小時)';
        return '<div class="d-row"><div class="d-top"><span class="d-l">'+left+'</span><span class="d-r">'+right+'</span>'+
          '<button class="d-edit" data-ri="'+idx+'" title="編輯">✎</button></div>'+
          (r.m ? '<div class="d-memo">📝 '+esc(r.m)+'</div>' : '')+'</div>';
      }).join('');
    card.innerHTML =
      '<div class="stat-head"><span class="em">'+c.em+'</span>'+
      '<span class="nm">'+esc(name)+'</span>'+
      '<span class="tot">'+tot.join('<br>')+'</span>'+
      '<span class="arrow">▶</span></div>'+
      '<div class="stat-detail">'+detail+'</div>';
    card.querySelector('.stat-head').onclick = ()=>card.classList.toggle('open');
    card.querySelectorAll('.d-edit').forEach(b=>{
      b.onclick = ev=>{
        ev.stopPropagation();
        const r = DB.records[parseInt(b.dataset.ri,10)];
        if(r) openRecEdit(r);
      };
    });
    box.appendChild(card);
  });
}
function renderStatCal(recs){
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = WD.map((w,i)=>'<div class="cal-wd'+(i===0?' sun':(i===6?' sat':''))+'">'+w+'</div>').join('');
  const first = new Date(statY, statM-1, 1);
  const daysInMonth = new Date(statY, statM, 0).getDate();
  const today = todayStr();
  const hols = jpHolidays(statY);
  const byDay = {};
  recs.forEach(r=>{ (byDay[r.d] = byDay[r.d]||[]).push(r); });
  for(let i=0;i<first.getDay();i++){
    grid.insertAdjacentHTML('beforeend','<div class="cal-day blank"></div>');
  }
  for(let d=1; d<=daysInMonth; d++){
    const ds = statY+'-'+String(statM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const rs = byDay[ds]||[];
    const wd = new Date(statY, statM-1, d).getDay();
    const hol = hols[ds];
    const cell = document.createElement('button');
    cell.className = 'cal-day'
      +(rs.length?' has':'')
      +(ds===today?' today':'')
      +(ds===calSelDay?' sel':'')
      +(wd===0?' sun':(wd===6?' sat':''))
      +(hol?' hol':'');
    let dots = '';
    if(rs.length){
      const cs = [...new Set(rs.map(r=>r.c))].slice(0,4);
      dots = '<span class="cal-dots">'+
        cs.slice(0,3).map(n=>{
          const c = courseOf(n)||{ci:5};
          return '<i style="background:'+colorOf(c)[0]+'"></i>';
        }).join('')+
        (cs.length>3 ? '<i class="more">+</i>' : '')+
        '</span>';
    }
    cell.innerHTML = '<span class="dnum">'+d+'</span>'
      +(hol ? '<span class="hname">'+hol+'</span>' : '')
      + dots;
    cell.onclick = ()=>{ calSelDay = (calSelDay===ds ? null : ds); renderStats(); };
    grid.appendChild(cell);
  }
  // 選中日的明細
  const dbox = document.getElementById('cal-detail');
  if(calSelDay){
    dbox.style.display = 'block';
    const hol = hols[calSelDay];
    document.getElementById('cal-detail-title').innerHTML =
      '📌 '+fmtDate(calSelDay)+(hol ? '<span class="hol-tag">🎌 '+hol+'</span>' : '');
    const list = document.getElementById('cal-detail-list');
    list.innerHTML = '';
    const rs = (byDay[calSelDay]||[]).slice().sort((a,b)=>(a.s||'').localeCompare(b.s||''));
    if(rs.length===0){
      list.innerHTML = '<div class="empty" style="padding:10px 0">這天沒有上課紀錄</div>';
    }else{
      rs.forEach(r=> list.appendChild(createRecRow(r, {edit:true, del:false})));
    }
  }else{
    dbox.style.display = 'none';
  }
}

/* ================= 作業頁 ================= */
let newHwMode = 'd';
function streakOf(hw){
  const days = new Set(hw.logs.map(l=>l.d));
  let n = 0;
  const cur = new Date();
  if(!days.has(todayStr())) cur.setDate(cur.getDate()-1);
  for(;;){
    const ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    if(!days.has(ds)) break;
    n++; cur.setDate(cur.getDate()-1);
  }
  return n;
}
function weekCells(hw){
  const days = {};
  hw.logs.forEach(l=>{ days[l.d] = true; });
  let html = '<div class="hw-week">';
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const on = !!days[ds];
    html += '<div class="wcell">'+(i===0?'今天':(d.getMonth()+1)+'/'+d.getDate())+
      '<span class="b'+(on?' on':'')+'">'+(on?'⭐':'')+'</span></div>';
  }
  return html+'</div>';
}
let hwMinInput = {};
function renderHw(){
  const active = DB.homeworks.filter(h=>!h.done);
  const done = DB.homeworks.filter(h=>h.done);
  const box = document.getElementById('hw-active');
  const today = todayStr();
  if(active.length===0){
    box.innerHTML = '<div class="card"><div class="empty"><span class="face">🌈</span>目前沒有進行中的作業<br>記錄上課時勾「有作業」,或在下面直接新增</div></div>';
  }else{
    box.innerHTML = '';
    active.forEach(hw=>{
      const c = courseOf(hw.c) || {em:'⭐',ci:5};
      const [col,soft] = colorOf(c);
      const streak = streakOf(hw);
      const todayLogs = hw.logs.filter(l=>l.d===today);
      const totalDays = new Set(hw.logs.map(l=>l.d)).size;
      const totalMin = hw.logs.reduce((s,l)=>s+(l.m||0),0);
      const card = document.createElement('div');
      card.className = 'hw-card';
      card.style.setProperty('--c',col); card.style.setProperty('--c-soft',soft);
      let meta = '<div class="hw-meta">'+
        '<span>'+fmtDate(hw.d)+' 出的作業</span>'+
        (streak>0 ? '<span class="fire">🔥 連續 '+streak+' 天</span>' : '')+
        (hw.mode==='t'
          ? '<span>累計 '+fmtMin(totalMin)+'</span>'
          : '<span>累計 '+totalDays+' 次</span>')+
        '</div>';
      let action;
      if(hw.mode==='d'){
        action = todayLogs.length
          ? '<div class="hw-done-today">🎉 今天練習完成!</div>'
          : '<button class="check-btn" data-act="check">今天練習了!⭐</button>';
      }else{
        const cur = hwMinInput[hw.id] || 30;
        const doneMin = todayLogs.reduce((s,l)=>s+(l.m||0),0);
        action =
          (doneMin>0 ? '<div class="hw-done-today" style="margin-bottom:6px">🎉 今天已練 '+fmtMin(doneMin)+'</div>' : '')+
          '<div class="stepper small">'+
            '<button data-act="min-">−</button>'+
            '<div class="num">'+fmtMin(cur)+'</div>'+
            '<button data-act="min+">＋</button>'+
          '</div>'+
          '<button class="check-btn" data-act="check">記錄練習!⏱</button>';
      }
      card.innerHTML =
        '<div class="hw-top"><span class="em">'+c.em+'</span><span class="nm">'+esc(hw.c)+'</span>'+
        '<span class="mode-tag '+hw.mode+'">'+(hw.mode==='d'?'✅ 完成型':'⏱ 計時型')+'</span></div>'+
        '<div class="hw-txt">'+esc(hw.txt)+'</div>'+
        meta + weekCells(hw) + action +
        '<div class="hw-actions">'+
          '<button class="mini" data-act="edit">✎ 編輯</button>'+
          (todayLogs.length ? '<button class="mini" data-act="undo">取消今天的打卡</button>' : '')+
          '<button class="mini" data-act="finish">✔ 作業完成了</button>'+
          '<button class="mini" data-act="del">刪除</button>'+
        '</div>';
      card.addEventListener('click', ev=>{
        const act = ev.target.dataset && ev.target.dataset.act;
        if(!act) return;
        if(act==='min-'){ hwMinInput[hw.id] = Math.max(15,(hwMinInput[hw.id]||30)-15); renderHw(); }
        if(act==='min+'){ hwMinInput[hw.id] = Math.min(240,(hwMinInput[hw.id]||30)+15); renderHw(); }
        if(act==='check'){
          if(hw.mode==='d'){ hw.logs.push({d:today}); toast('打卡成功!好棒 ⭐'); }
          else{ hw.logs.push({d:today, m:hwMinInput[hw.id]||30}); toast('練習記錄好了!⏱'); }
          save(); renderHw();
        }
        if(act==='undo'){
          hw.logs = hw.logs.filter(l=>l.d!==today);
          save(); renderHw();
        }
        if(act==='edit'){ openHwEdit(hw); }
        if(act==='finish'){
          if(confirm('「'+hw.txt+'」完成了嗎?會移到完成清單裡。')){
            hw.done = true; hw.doneAt = today; save(); renderHw();
            toast('作業完成!太厲害了 🏅');
          }
        }
        if(act==='del'){
          if(confirm('要刪除這項作業和它的打卡紀錄嗎?')){
            DB.homeworks = DB.homeworks.filter(x=>x!==hw);
            save(); renderHw();
          }
        }
      });
      box.appendChild(card);
    });
  }
  // 完成清單(可編輯、可復原、可刪除)
  const dbox = document.getElementById('hw-done');
  if(done.length===0){
    dbox.innerHTML = '<div class="empty" style="padding:12px 0">還沒有完成的作業</div>';
  }else{
    dbox.innerHTML = '';
    done.slice().reverse().forEach(hw=>{
      const c = courseOf(hw.c) || {em:'⭐',ci:5};
      const [col,soft] = colorOf(c);
      const totalDays = new Set(hw.logs.map(l=>l.d)).size;
      const totalMin = hw.logs.reduce((s,l)=>s+(l.m||0),0);
      const sum = hw.mode==='t' ? '共練 '+fmtMin(totalMin) : '共打卡 '+totalDays+' 次';
      const div = document.createElement('div');
      div.className = 'rec';
      div.style.setProperty('--c',col); div.style.setProperty('--c-soft',soft);
      div.innerHTML =
        '<div class="badge">🏅</div>'+
        '<div class="info"><b>'+esc(hw.c)+':'+esc(hw.txt)+'</b>'+
        '<span>'+fmtDate(hw.d)+' 出'+(hw.doneAt?' → '+fmtDate(hw.doneAt)+' 完成':'')+'・'+sum+'</span></div>'+
        '<button class="icon-btn edit" title="編輯">✎</button>'+
        '<button class="icon-btn" title="復原" style="color:#8fbfae">↩</button>'+
        '<button class="icon-btn del" title="刪除">✕</button>';
      const btns = div.querySelectorAll('.icon-btn');
      btns[0].onclick = ()=>openHwEdit(hw);
      btns[1].onclick = ()=>{
        hw.done = false; delete hw.doneAt; save(); renderHw();
        toast('作業回到進行中囉');
      };
      btns[2].onclick = ()=>{
        if(confirm('要刪除這項完成的作業嗎?')){
          DB.homeworks = DB.homeworks.filter(x=>x!==hw);
          save(); renderHw();
        }
      };
      dbox.appendChild(div);
    });
  }
  const sel = document.getElementById('hw-new-course');
  sel.innerHTML = DB.courses.map(c=>'<option value="'+esc(c.name)+'">'+c.em+' '+esc(c.name)+'</option>').join('');
}
function pickNewHwMode(m){
  newHwMode = m;
  document.querySelectorAll('[data-nhm]').forEach(b=>b.classList.toggle('sel', b.dataset.nhm===m));
}
function addHwDirect(){
  const c = document.getElementById('hw-new-course').value;
  const txt = document.getElementById('hw-new-txt').value.trim();
  if(!c){ toast('先新增課程才能加作業唷'); return; }
  if(!txt){ toast('作業內容還沒填唷'); return; }
  DB.homeworks.push({
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    c, d: todayStr(), txt, mode:newHwMode, done:false, logs:[]
  });
  save();
  document.getElementById('hw-new-txt').value='';
  toast('作業加進打卡清單囉!📚');
  renderHw();
}

/* ================= 分享頁 ================= */
function initShare(){
  const m = document.getElementById('rep-month');
  if(!m.value) m.value = statY+'-'+String(statM).padStart(2,'0');
  const sel = document.getElementById('rep-course');
  sel.innerHTML = DB.courses.map(c=>'<option value="'+esc(c.name)+'">'+c.em+' '+esc(c.name)+'</option>').join('');
  buildReport();
}
function shareMode(m){
  document.getElementById('share-report').style.display = m==='report'?'block':'none';
  document.getElementById('share-backup').style.display = m==='backup'?'block':'none';
  document.getElementById('stab-report').classList.toggle('sel', m==='report');
  document.getElementById('stab-backup').classList.toggle('sel', m==='backup');
}
function reportText(){
  const mv = document.getElementById('rep-month').value;
  const course = document.getElementById('rep-course').value;
  if(!mv || !course) return null;
  const [y,m] = mv.split('-').map(Number);
  const rs = monthRecords(y,m,course).sort((a,b)=>a.d.localeCompare(b.d)||(a.s||'').localeCompare(b.s||''));
  if(rs.length===0) return '【'+course+'】'+y+'年'+m+'月 沒有上課紀錄';
  const lines = rs.map(r=> r.t==='g'
    ? fmtDate(r.d)+' 團體課 '+r.n+'堂'
    : fmtDate(r.d)+' 個人課 '+r.s+'–'+r.e+'('+fmtH(hoursOf(r))+'小時)'
  );
  const g = rs.filter(r=>r.t==='g').reduce((s,r)=>s+r.n,0);
  const p = rs.filter(r=>r.t==='p').reduce((s,r)=>s+hoursOf(r),0);
  let sum = [];
  if(g>0) sum.push('團體課 '+g+'堂');
  if(p>0) sum.push('個人課 '+fmtH(p)+'小時');
  return '【'+course+'】'+y+'年'+m+'月 上課紀錄\n'+lines.join('\n')+'\n─────\n合計:'+sum.join('/');
}
function buildReport(){
  const t = reportText();
  document.getElementById('rep-preview').textContent = t || '選好月份和課程後,這裡會出現預覽 ✨';
}
async function shareText(text, title){
  if(navigator.share){
    try{ await navigator.share({title, text}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  try{
    await navigator.clipboard.writeText(text);
    toast('已複製,貼到 LINE 就可以囉');
  }catch(e){
    prompt('長按全選複製:', text);
  }
}
function shareReport(){
  const t = reportText();
  if(!t){ toast('先選月份和課程唷'); return; }
  shareText(t, '才藝課紀錄');
}
function shareBackup(){
  const now = new Date();
  const cur = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const prev = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prv = prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0');
  const recs = DB.records.filter(r=> r.d.startsWith(cur) || r.d.startsWith(prv));
  const payload = PREFIX_V2 + JSON.stringify({courses:DB.courses, records:recs, homeworks:DB.homeworks});
  shareText(payload, '才藝課紀錄備份');
}
function importBackup(){
  const raw = document.getElementById('imp-text').value.trim();
  if(!raw){ toast('先貼上備份文字唷'); return; }
  let body = null;
  const i2 = raw.indexOf(PREFIX_V2);
  const i1 = raw.indexOf(PREFIX_V1);
  if(i2>-1) body = raw.slice(i2+PREFIX_V2.length);
  else if(i1>-1) body = raw.slice(i1+PREFIX_V1.length);
  else { toast('這不是備份文字,認不得 🥺'); return; }
  let data;
  try{ data = JSON.parse(body); }
  catch(e){ toast('備份文字好像不完整,再複製一次看看'); return; }
  if(!data || !Array.isArray(data.records)){ toast('備份內容格式不對唷'); return; }
  let newCourse = 0;
  (data.courses||[]).forEach(c=>{
    if(c && c.name && !courseOf(c.name)){
      DB.courses.push({name:c.name, em:c.em||'⭐', types:c.types||'g', ci:c.ci??(DB.courses.length%COLORS.length)});
      newCourse++;
    }
  });
  const keys = new Set(DB.records.map(recKey));
  let added = 0;
  data.records.forEach(r=>{
    if(!r || !r.d || !r.c || !r.t) return;
    const k = recKey(r);
    if(!keys.has(k)){ DB.records.push(r); keys.add(k); added++; }
  });
  let addedHw = 0;
  const hwIds = new Set(DB.homeworks.map(h=>h.id));
  (data.homeworks||[]).forEach(h=>{
    if(!h || !h.id || !h.c || !h.txt) return;
    if(!hwIds.has(h.id)){
      if(!Array.isArray(h.logs)) h.logs = [];
      DB.homeworks.push(h); hwIds.add(h.id); addedHw++;
    }
  });
  save();
  document.getElementById('imp-text').value='';
  let parts = ['新增 '+added+' 筆紀錄'];
  if(newCourse) parts.push(newCourse+' 個課程');
  if(addedHw) parts.push(addedHw+' 項作業');
  toast('匯入完成:'+parts.join('、'));
  renderRecent();
}

/* ================= 課程管理 ================= */
let newType = 'g', newEmoji = EMOJIS[0];
function renderCourses(){
  const box = document.getElementById('course-list');
  if(DB.courses.length===0){
    box.innerHTML = '<div class="empty"><span class="face">🌱</span>還沒有課程,在下面新增吧!</div>';
    return;
  }
  box.innerHTML = '';
  DB.courses.forEach(c=>{
    const [col,soft] = colorOf(c);
    const div = document.createElement('div');
    div.className = 'course-row';
    div.style.setProperty('--c-soft',soft);
    let tags = '';
    if(c.types.includes('g')) tags += '<span class="tag g">團體</span>';
    if(c.types.includes('p')) tags += '<span class="tag p">個人</span>';
    div.innerHTML =
      '<div class="badge">'+c.em+'</div>'+
      '<div class="nm">'+esc(c.name)+tags+'</div>'+
      '<button class="icon-btn edit" title="編輯">✎</button>'+
      '<button class="icon-btn del" title="刪除">✕</button>';
    div.querySelector('.icon-btn.edit').onclick = ()=>openCourseEdit(c);
    div.querySelector('.icon-btn.del').onclick = ()=>{
      const n = DB.records.filter(r=>r.c===c.name).length;
      const msg = n>0
        ? '「'+c.name+'」有 '+n+' 筆紀錄。刪除課程後紀錄會保留在統計裡,但無法再新增。確定刪除?'
        : '確定要刪除「'+c.name+'」嗎?';
      if(confirm(msg)){
        DB.courses = DB.courses.filter(x=>x!==c);
        save(); renderCourses();
      }
    };
    box.appendChild(div);
  });
}
function pickNewType(t){
  newType = t;
  document.querySelectorAll('[data-nt]').forEach(b=>b.classList.toggle('sel', b.dataset.nt===t));
}
function renderEmojiPick(){
  const box = document.getElementById('emoji-pick');
  box.innerHTML = '';
  EMOJIS.forEach(em=>{
    const b = document.createElement('button');
    b.textContent = em;
    b.className = em===newEmoji ? 'sel':'';
    b.onclick = ()=>{ newEmoji = em; renderEmojiPick(); };
    box.appendChild(b);
  });
}
function addCourse(){
  const name = document.getElementById('new-name').value.trim();
  if(!name){ toast('課程名稱還沒填唷'); return; }
  if(courseOf(name)){ toast('已經有這個課程囉'); return; }
  DB.courses.push({name, em:newEmoji, types:newType, ci:DB.courses.length%COLORS.length});
  save();
  document.getElementById('new-name').value='';
  toast('「'+name+'」加入課表!🎉');
  renderCourses();
}

/* ================= 啟動 ================= */
load();
initStatMonth();
renderChips();
renderRecent();
renderEmojiPick();
</script>
